name: Build Islamic App APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4
        
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/$(ls $ANDROID_SDK_ROOT/ndk/ | head -1)" >> local.properties
        
    - name: Grant execute permission
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: |
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace --info
        
    - name: Check build output
      run: |
        echo "=== Build outputs ===" 
        find . -name "*.apk" -type f
        ls -lh app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK found"
        
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: تطبيق-محمد-عبد-العظيم-الطويل
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build/outputs/
          build/
        retention-days: 7
